name: MobMorph Source Probe
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
      - name: Generate Minecraft sources
        run: gradle --no-daemon genSources --stacktrace
      - name: Build probe project
        run: gradle --no-daemon clean build --stacktrace
      - name: Collect sources
        if: always()
        run: |
          mkdir -p artifact
          find ~/.gradle/caches/fabric-loom -type f \( -name '*sources*.jar' -o -name '*26.2*.jar' -o -name '*mappings*.txt' -o -name '*26.2*.json' \) -print -exec cp --parents '{}' artifact/ \; || true
          cp -r build/reports artifact/build-reports 2>/dev/null || true
          cp -r build/libs artifact/build-libs 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobmorph-probe
          path: artifact
          retention-days: 7
